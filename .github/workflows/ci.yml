name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install ruff pytest
      - run: ruff check .
      - run: python -m compileall agents api ingestion security observability data eval tests
      - run: pytest
      - run: python data/build_golden_set.py --output eval/golden_set.jsonl --target-size 20
      - run: python eval/ragas_runner.py --input eval/golden_set.jsonl

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
